name: 伝達ボード監視

on:
  push:
    paths:
      - 'board.md'
  schedule:
    # 毎日 9:00〜23:00 JST の間、30分ごとにチェック（UTC: 0:00〜14:00）
    - cron: '0,30 0-14 * * *'

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 変更検出（pushトリガー）
        if: github.event_name == 'push'
        id: detect_push
        run: |
          DIFF=$(git diff HEAD~1 HEAD -- board.md | grep "^+" | grep -v "^+++" | sed 's/^+//' || true)
          if echo "$DIFF" | grep -q "ダァイ→ゆうさん"; then
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "trigger=push" >> $GITHUB_OUTPUT
            echo "instruction<<EOF" >> $GITHUB_OUTPUT
            echo "$DIFF" | head -10 >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: 未対応指示チェック（cronトリガー）
        if: github.event_name == 'schedule'
        id: detect_cron
        run: |
          # board.mdから最新の伝達事項を取得
          LATEST=$(sed -n '/^## 伝達事項/,/^## アーカイブ/p' board.md | head -30)
          
          # ダァイからの指示で「対応済み」マークがないものを検出
          if echo "$LATEST" | grep -q "ダァイ→ゆうさん"; then
            # 最新の指示を抽出
            INSTRUCTION=$(echo "$LATEST" | grep -A2 "ダァイ→ゆうさん" | head -6)
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "trigger=cron" >> $GITHUB_OUTPUT
            echo "instruction<<EOF" >> $GITHUB_OUTPUT
            echo "$INSTRUCTION" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Chatworkに通知（push）
        if: steps.detect_push.outputs.has_new == 'true'
        run: |
          MESSAGE="[info][title]📋 ダァイが伝達ボードに書き込みました[/title]${{ steps.detect_push.outputs.instruction }}

          ---
          ゆうさんのタブで「伝達ボードみて」と伝えてください。[/info]"
          
          curl -s -X POST \
            -H "X-ChatWorkToken: ${{ secrets.CHATWORK_API_TOKEN }}" \
            -d "body=${MESSAGE}" \
            "https://api.chatwork.com/v2/rooms/${{ secrets.CHATWORK_ROOM_ID }}/messages"

      - name: Chatworkにリマインド（cron）
        if: steps.detect_cron.outputs.has_new == 'true'
        run: |
          MESSAGE="[info][title]🔔 伝達ボードに未対応の指示があります[/title]ダァイからゆうさん宛ての指示が残っています。

          ${{ steps.detect_cron.outputs.instruction }}

          ---
          ゆうさんのタブで「伝達ボードみて」と伝えてください。[/info]"
          
          curl -s -X POST \
            -H "X-ChatWorkToken: ${{ secrets.CHATWORK_API_TOKEN }}" \
            -d "body=${MESSAGE}" \
            "https://api.chatwork.com/v2/rooms/${{ secrets.CHATWORK_ROOM_ID }}/messages"
